services:
  - type: web
    name: tamil-nadu-tourism-search-api
    plan: free
    runtime: python
    buildCommand: "pip install -r api/requirements.txt"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0 # Or the user's current version
    healthCheckPath: /api/health
